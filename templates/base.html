<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dashboard{% endblock %} — {{ business_name or 'Bolts11' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ────────────────────────────────────────────── */
    :root {
      --sidebar-w: 220px;
      --sidebar-bg: #12141c;
      --sidebar-border: rgba(255,255,255,0.06);
      --sidebar-text: #8b8fa3;
      --sidebar-text-hover: #c8cad3;
      --sidebar-active-bg: rgba(59,130,246,0.12);
      --sidebar-active-text: #6ea8fe;
      --topbar-h: 48px;
      --bg-page: #f3f4f6;
      --bg-card: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-tertiary: #9ca3af;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
      --blue: #2563eb;
    }

    /* ── Reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      display: flex;
    }

    /* ── Sidebar ──────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      z-index: 50;
    }
    .sidebar-brand {
      padding: 20px 18px 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .sidebar-sub {
      padding: 0 18px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--sidebar-text);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .sidebar-section {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #4b4f63;
      padding: 14px 18px 6px;
    }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--sidebar-text);
      text-decoration: none;
      transition: all 0.12s;
      border-left: 3px solid transparent;
    }
    .sidebar-link:hover {
      color: var(--sidebar-text-hover);
      background: rgba(255,255,255,0.04);
    }
    .sidebar-link.active {
      color: var(--sidebar-active-text);
      background: var(--sidebar-active-bg);
      border-left-color: var(--sidebar-active-text);
    }
    .sidebar-icon {
      width: 18px;
      text-align: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .sidebar-spacer { flex: 1; }
    .sidebar-logout {
      display: block;
      padding: 10px 18px;
      font-size: 13px;
      color: #64748b;
      text-decoration: none;
      border-top: 1px solid var(--sidebar-border);
    }
    .sidebar-logout:hover { color: #f1f5f9; }
    .sidebar-footer {
      padding: 12px 18px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #3d4057;
      border-top: 1px solid var(--sidebar-border);
    }

    /* ── Hamburger (mobile only) ──────────────────────────────── */
    #hamburger {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 60;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: none;
      background: var(--sidebar-bg);
      cursor: pointer;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    #hamburger span {
      display: block;
      width: 18px;
      height: 2px;
      background: #fff;
      border-radius: 1px;
      transition: transform 0.2s;
    }
    #sidebar-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 45;
    }

    @media (max-width: 768px) {
      #hamburger { display: flex; }
      #sidebar {
        position: fixed;
        top: 0; left: 0;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar.open ~ #sidebar-overlay { display: block; }
    }

    /* ── Main content ─────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── Top bar ──────────────────────────────────────────────── */
    #topbar {
      height: var(--topbar-h);
      flex-shrink: 0;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    @media (max-width: 768px) { #topbar { padding-left: 56px; } }
    .topbar-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--text-primary);
    }
    .topbar-meta {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-tertiary);
    }

    /* ── Content scroll area ──────────────────────────────────── */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* ── Shared card styles ───────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
    }
    .card-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-tertiary);
    }
    .card-body { padding: 16px; }
    .card-body-flush { padding: 0; }

    /* ── Metrics row ──────────────────────────────────────────── */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .metric {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .metric-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
    }
    .metric-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
      margin-top: 4px;
    }
    .metric-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    .c-green { color: var(--green); }
    .c-amber { color: var(--amber); }
    .c-red { color: var(--red); }
    .c-blue { color: var(--blue); }

    /* ── Data table ───────────────────────────────────────────── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }
    .data-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #f9fafb; }

    /* ── Badge ────────────────────────────────────────────────── */
    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: inline-block;
    }
    .badge-green { background: #dcfce7; color: #15803d; }
    .badge-amber { background: #fef3c7; color: #b45309; }
    .badge-red { background: #fee2e2; color: #b91c1c; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-gray { background: #f3f4f6; color: #6b7280; }

    /* ── Two-column grid ──────────────────────────────────────── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ── ID short ─────────────────────────────────────────────── */
    .id-short {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-tertiary);
    }

    /* ── Empty state ──────────────────────────────────────────── */
    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 13px;
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <!-- Hamburger (mobile) -->
  <button id="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
  <div id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('open')"></div>

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-brand">BOLTS11</div>
    <div class="sidebar-sub">{{ business_name or 'Dashboard' }}</div>

    <div class="sidebar-section">Main</div>
    <a href="/dashboard/" class="sidebar-link {{ 'active' if active_page == 'control' else '' }}">
      <span class="sidebar-icon">&#9632;</span> Control Board
    </a>
    <a href="/dashboard/office.html" class="sidebar-link {{ 'active' if active_page == 'office' else '' }}">
      <span class="sidebar-icon">&#9783;</span> Invoices
    </a>

    <div class="sidebar-section">System</div>
    <a href="/dashboard/command.html" class="sidebar-link {{ 'active' if active_page == 'command' else '' }}">
      <span class="sidebar-icon">&#9655;</span> Command Center
    </a>
    <a href="/dashboard/onboarding.html" class="sidebar-link {{ 'active' if active_page == 'onboarding' else '' }}">
      <span class="sidebar-icon">&#10010;</span> Onboarding
    </a>

    <div class="sidebar-spacer"></div>
    <a href="/logout" class="sidebar-logout">Sign out</a>
    <div class="sidebar-footer">
      Bolts11 &middot; AI Back Office
    </div>
  </nav>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <span class="topbar-title">{% block page_title %}Dashboard{% endblock %}</span>
      <span class="topbar-meta">{% block topbar_meta %}{% endblock %}</span>
    </div>
    <div id="content">
      {% block content %}{% endblock %}
    </div>
  </div>

  {% block extra_js %}{% endblock %}

  <script>
    // Mobile: close sidebar when a nav link is clicked
    document.querySelectorAll('.sidebar-link').forEach(function(link) {
      link.addEventListener('click', function() {
        document.getElementById('sidebar').classList.remove('open');
      });
    });
  </script>
</body>
</html>
