<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Segoe UI', Roboto, Georgia, serif;
      background: #f5f5f0;
      color: #1a1a1a;
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      overflow: hidden;
      text-align: center;
    }
    .header {
      background: #1a3a2a;
      color: #fff;
      padding: 2rem 1.5rem;
    }
    .header .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }
    .header h1 {
      font-size: 1.2rem;
      font-weight: 600;
    }
    .body {
      padding: 2rem 1.5rem;
      line-height: 1.6;
      font-size: 0.95rem;
      color: #555;
    }
    .body p { margin-bottom: 1rem; }
    .contact {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #1a3a2a;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .contact:active { opacity: 0.85; }
    .footer {
      background: #f0ede8;
      padding: 0.75rem 1.5rem;
      font-size: 0.75rem;
      color: #999;
      border-top: 1px solid #e0ddd8;
    }
    .footer a { color: #999; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">{{ icon }}</div>
      <h1>{{ heading }}</h1>
    </div>
    <div class="body">
      <p>{{ message }}</p>
      {% if contact_phone %}
      <a href="tel:{{ contact_phone }}" class="contact">Call {{ business_name or 'Us' }}</a>
      {% endif %}
    </div>
    <div class="footer">
      Powered by <a href="https://bolts11.com">Bolts11</a>
    </div>
  </div>
</body>
</html>
