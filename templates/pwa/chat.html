<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Chat — Bolts11</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#132038">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/static/icon-192.png">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;-webkit-tap-highlight-color:transparent}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#132038;color:#fff;
      min-height:100vh;display:flex;flex-direction:column;
      padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
      overflow:hidden;
    }

    /* ---- Top bar ---- */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 18px;background:rgba(0,0,0,.2);
      flex-shrink:0;
    }
    .topbar a{color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;padding:6px 10px}
    .topbar .who{font-size:13px;color:rgba(255,255,255,.6)}
    .topbar .who strong{color:#fff;font-weight:600}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .new-chat-btn{
      background:rgba(245,158,11,.15);
      border:1px solid rgba(245,158,11,.4);
      color:#f59e0b;
      border-radius:14px;
      padding:7px 12px;
      font-size:13px;font-weight:600;
      font-family:inherit;
      cursor:pointer;
      transition:background .15s,transform .1s;
    }
    .new-chat-btn:hover{background:rgba(245,158,11,.25)}
    .new-chat-btn:active{transform:scale(.95)}

    /* ---- Chat scroll area ---- */
    main{
      flex:1;overflow-y:auto;
      padding:20px 16px 12px;
      display:flex;flex-direction:column;gap:10px;
      -webkit-overflow-scrolling:touch;
    }

    /* ---- Mode picker (shown when chat is empty) ---- */
    .mode-picker{
      display:flex;flex-direction:column;align-items:center;
      padding:24px 0 8px;gap:12px;
      width:100%;
    }
    .mode-picker-label{
      font-size:13px;color:rgba(255,255,255,.4);
      text-transform:uppercase;letter-spacing:.08em;
      margin-bottom:4px;
    }
    .mode-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      width:100%;
      max-width:360px;
    }
    .mode-btn{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);
      border-radius:14px;
      padding:18px 12px;
      color:#fff;
      font-family:inherit;
      cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:6px;
      transition:background .15s,transform .1s,border-color .15s;
      min-height:90px;justify-content:center;
    }
    .mode-btn:active{transform:scale(.96)}
    .mode-btn:hover{background:rgba(255,255,255,.1)}
    .mode-btn .mode-icon{font-size:26px;line-height:1}
    .mode-btn .mode-label{font-size:13px;font-weight:600;text-align:center;line-height:1.2}
    .mode-btn .mode-sub{font-size:10px;color:rgba(255,255,255,.4);text-align:center}

    /* Estimate button — amber tint */
    .mode-btn.estimate{
      border-color:rgba(245,158,11,.3);
      background:rgba(245,158,11,.08);
    }
    .mode-btn.estimate:hover{background:rgba(245,158,11,.15)}
    .mode-btn.estimate .mode-label{color:#f59e0b}

    /* Job Tracker — green tint */
    .mode-btn.job-tracker{
      border-color:rgba(34,197,94,.25);
      background:rgba(34,197,94,.07);
    }
    .mode-btn.job-tracker:hover{background:rgba(34,197,94,.14)}
    .mode-btn.job-tracker .mode-label{color:#86efac}

    /* Work Order — blue tint */
    .mode-btn.work-order{
      border-color:rgba(96,165,250,.25);
      background:rgba(96,165,250,.07);
    }
    .mode-btn.work-order:hover{background:rgba(96,165,250,.14)}
    .mode-btn.work-order .mode-label{color:#93c5fd}

    /* Add Customer — neutral */
    .mode-btn.add-customer{
      border-color:rgba(255,255,255,.15);
    }

    /* coming-soon badge */
    .mode-btn.soon{opacity:.5;cursor:default}
    .mode-btn.soon:active{transform:none}
    .mode-btn .soon-badge{
      font-size:9px;color:#f59e0b;
      text-transform:uppercase;letter-spacing:.06em;
      margin-top:2px;
    }

    /* ---- Message bubbles ---- */
    .msg{display:flex;gap:8px;max-width:88%}
    .msg.user{align-self:flex-end;flex-direction:row-reverse}
    .msg.assistant{align-self:flex-start}

    .bubble{
      padding:11px 14px;border-radius:16px;
      font-size:15px;line-height:1.4;
      word-wrap:break-word;white-space:pre-wrap;
    }
    .msg.user .bubble{
      background:#f59e0b;color:#132038;
      border-bottom-right-radius:4px;
      font-weight:500;
    }
    .msg.assistant .bubble{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      border-bottom-left-radius:4px;
    }
    .msg.assistant.error .bubble{
      background:rgba(220,38,38,.15);
      border-color:rgba(220,38,38,.3);
      color:#fca5a5;
    }

    .ts{
      font-size:10px;color:rgba(255,255,255,.3);
      margin-top:2px;padding:0 4px;
    }
    .msg.user .ts{text-align:right}

    /* ---- Action chips ---- */
    .chip{
      align-self:flex-start;margin-top:6px;
      padding:10px 16px;background:#f59e0b;color:#132038;
      border:none;border-radius:18px;font-size:14px;font-weight:700;
      font-family:inherit;cursor:pointer;
      display:inline-flex;align-items:center;gap:6px;
      transition:opacity .15s,transform .1s;
      max-width:100%;text-align:left;
    }
    .chip:active{transform:scale(.96)}
    .chip:disabled{opacity:.5;cursor:wait}
    .chip.done{
      background:rgba(22,163,74,.18);color:#86efac;
      border:1px solid rgba(22,163,74,.3);cursor:default;font-weight:600;
    }
    .chip.done:active{transform:none}
    .chip-link{
      align-self:flex-start;margin-top:6px;
      padding:8px 14px;
      background:rgba(245,158,11,.15);color:#f59e0b;
      border:1px solid rgba(245,158,11,.4);border-radius:14px;
      font-size:13px;font-weight:600;text-decoration:none;
      display:inline-flex;align-items:center;gap:6px;
    }
    .chip-error{
      align-self:flex-start;margin-top:6px;padding:8px 14px;
      background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.3);
      color:#fca5a5;border-radius:14px;font-size:12px;
    }

    /* ---- Typing indicator ---- */
    .typing{
      display:flex;gap:4px;padding:14px;
      background:rgba(255,255,255,.08);
      border-radius:16px;border-bottom-left-radius:4px;
      align-self:flex-start;
    }
    .typing span{
      width:7px;height:7px;border-radius:50%;
      background:rgba(255,255,255,.5);
      animation:bounce 1.4s infinite ease-in-out;
    }
    .typing span:nth-child(2){animation-delay:.16s}
    .typing span:nth-child(3){animation-delay:.32s}
    @keyframes bounce{
      0%,80%,100%{transform:translateY(0);opacity:.4}
      40%{transform:translateY(-6px);opacity:1}
    }

    /* ---- Composer ---- */
    .composer{
      flex-shrink:0;
      padding:10px 12px env(safe-area-inset-bottom);
      background:#132038;border-top:1px solid rgba(255,255,255,.08);
      display:flex;gap:8px;align-items:flex-end;
    }
    .composer textarea{
      flex:1;padding:12px 14px;font-size:16px;font-family:inherit;
      background:rgba(255,255,255,.08);
      border:1.5px solid rgba(255,255,255,.12);
      border-radius:20px;color:#fff;outline:none;
      resize:none;max-height:120px;min-height:44px;line-height:1.4;
    }
    .composer textarea:focus{
      border-color:#f59e0b;background:rgba(255,255,255,.12);
    }
    .composer textarea::placeholder{color:rgba(255,255,255,.35)}
    .send-btn{
      width:44px;height:44px;flex-shrink:0;
      border:none;border-radius:50%;background:#f59e0b;color:#132038;
      font-size:20px;font-weight:800;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:opacity .15s,transform .1s;
    }
    .send-btn:active{transform:scale(.95)}
    .send-btn:disabled{opacity:.4;cursor:not-allowed}
    .mic-btn{
      width:44px;height:44px;flex-shrink:0;border:none;border-radius:50%;
      background:rgba(255,255,255,.08);color:#fff;font-size:20px;cursor:pointer;
      display:none;align-items:center;justify-content:center;
      transition:background .15s,transform .1s;
    }
    .mic-btn.available{display:flex}
    .mic-btn:active{transform:scale(.95)}
    .mic-btn.recording{
      background:#dc2626;
      animation:pulse 1.2s infinite ease-in-out;
    }
    @keyframes pulse{
      0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}
      50%{box-shadow:0 0 0 8px rgba(220,38,38,0)}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/pwa/">&larr; Home</a>
    <div class="topbar-right">
      <div class="who">Hi, <strong>{{ employee_name }}</strong></div>
      <button type="button" class="new-chat-btn" id="new-chat-btn">+ New</button>
    </div>
  </div>

  <main id="messages">
    <!-- Mode picker shown when chat is empty. Hidden once conversation starts. -->
    <div class="mode-picker" id="mode-picker">
      <div class="mode-picker-label">What would you like to do?</div>
      <div class="mode-grid">

        <button type="button" class="mode-btn estimate" data-intent="new estimate">
          <div class="mode-icon">📋</div>
          <div class="mode-label">New Estimate</div>
          <div class="mode-sub">Customer · Job · Price</div>
        </button>

        <button type="button" class="mode-btn job-tracker" data-intent="start job log">
          <div class="mode-icon">📅</div>
          <div class="mode-label">Job Tracker</div>
          <div class="mode-sub">Crew · Equipment · Materials</div>
        </button>

        <button type="button" class="mode-btn work-order" data-intent="new work order">
          <div class="mode-icon">🔧</div>
          <div class="mode-label">Work Order</div>
          <div class="mode-sub">Multi-day jobs</div>
        </button>

        <button type="button" class="mode-btn add-customer" data-intent="add a new customer">
          <div class="mode-icon">👤</div>
          <div class="mode-label">Add Customer</div>
          <div class="mode-sub">Name · Phone · Address</div>
        </button>

      </div>
    </div>
  </main>

  <form class="composer" id="composer" onsubmit="return false">
    <button type="button" class="mic-btn" id="mic-btn" aria-label="Voice input">&#127908;</button>
    <textarea
      id="input"
      placeholder="Message..."
      rows="1"
      autocomplete="off"
      autocapitalize="sentences"
    ></textarea>
    <button type="submit" class="send-btn" id="send-btn" aria-label="Send">&#10148;</button>
  </form>

<script>
var SESSION_ID = null;
var HAS_MESSAGES = false;   // true once the first message is in the thread

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function fmtTime(iso){
  if(!iso) return '';
  try{
    var d = new Date(iso);
    return d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
  }catch(e){return ''}
}

// ---------------------------------------------------------------------------
// Mode picker — hide once the conversation has started
// ---------------------------------------------------------------------------

function hideModes(){
  var picker = document.getElementById('mode-picker');
  if(picker) picker.remove();
}

// Wire mode buttons
document.querySelectorAll('.mode-btn[data-intent]').forEach(function(btn){
  btn.addEventListener('click', function(){
    var intent = btn.getAttribute('data-intent');
    if(!intent) return;
    hideModes();
    sendMessage(intent);
  });
});

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------

function appendMessage(role, content, ts, isError, action){
  hideModes();
  HAS_MESSAGES = true;

  var wrap = document.createElement('div');
  wrap.className = 'msg ' + role + (isError ? ' error' : '');

  var col = document.createElement('div');
  col.style.display = 'flex';
  col.style.flexDirection = 'column';
  col.style.maxWidth = '100%';

  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;
  col.appendChild(bubble);

  if(ts){
    var t = document.createElement('div');
    t.className = 'ts';
    t.textContent = fmtTime(ts);
    col.appendChild(t);
  }

  if(role === 'assistant' && action && action.type){
    var chip = renderChip(action);
    if(chip) col.appendChild(chip);
  }

  wrap.appendChild(col);
  document.getElementById('messages').appendChild(wrap);
  scrollToBottom();
}

// ---------------------------------------------------------------------------
// Action chips
// ---------------------------------------------------------------------------

function renderChip(action){
  var btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'chip';
  btn.textContent = action.label || 'Run action';
  btn.onclick = function(){ tapChip(btn, action); };
  return btn;
}

function replaceChip(oldNode, newNode){
  if(!oldNode || !oldNode.parentNode) return;
  oldNode.parentNode.replaceChild(newNode, oldNode);
}

async function tapChip(btn, action){
  if(!action || !action.endpoint) return;
  btn.disabled = true;
  var originalLabel = btn.textContent;
  btn.textContent = 'Working…';

  var method = (action.method || 'POST').toUpperCase();
  var fetchOpts = {method:method, headers:{'Content-Type':'application/json'}};
  if(method !== 'GET') fetchOpts.body = JSON.stringify(action.params || {});

  try{
    var r = await fetch(action.endpoint, fetchOpts);
    if(r.status === 401 || r.status === 403){window.location.href='/pwa/login';return}
    var d = {};
    try{d = await r.json();}catch(e){}

    if(!r.ok || d.success === false){
      var err = document.createElement('div');
      err.className = 'chip-error';
      err.textContent = (d && d.error) ? d.error : 'Action failed.';
      replaceChip(btn, err);
      return;
    }

    var followUrl = d.review_url || d.html_url || d.url || null;
    if(followUrl){
      var link = document.createElement('a');
      link.className = 'chip-link';
      link.href = followUrl;
      link.target = '_blank';
      link.rel = 'noopener';
      link.textContent = 'Open review →';
      replaceChip(btn, link);
    }else{
      var done = document.createElement('button');
      done.type = 'button';
      done.className = 'chip done';
      done.textContent = '✓ ' + originalLabel;
      done.disabled = true;
      replaceChip(btn, done);
    }
  }catch(e){
    var fail = document.createElement('div');
    fail.className = 'chip-error';
    fail.textContent = 'Network error. Try again.';
    replaceChip(btn, fail);
  }
}

function appendTyping(){
  var el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('messages').appendChild(el);
  scrollToBottom();
}

function removeTyping(){
  var t = document.getElementById('typing');
  if(t) t.remove();
}

function scrollToBottom(){
  var m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

// ---------------------------------------------------------------------------
// History load
// ---------------------------------------------------------------------------

async function loadHistory(){
  try{
    var r = await fetch('/pwa/api/chat/messages');
    if(r.status === 401 || r.status === 403){window.location.href='/pwa/login';return}
    var d = await r.json();
    if(!d.success) return;

    SESSION_ID = d.session_id;
    if(d.messages && d.messages.length){
      hideModes();
      HAS_MESSAGES = true;
      d.messages.forEach(function(m){
        var act = (m.metadata && m.metadata.action) || null;
        appendMessage(m.role, m.content, m.created_at, false, act);
      });
    }
  }catch(e){
    console.warn('history load failed', e);
  }
}

// ---------------------------------------------------------------------------
// Send
// ---------------------------------------------------------------------------

async function sendMessage(overrideText){
  var input = document.getElementById('input');
  var btn   = document.getElementById('send-btn');
  var text  = overrideText !== undefined ? overrideText : input.value.trim();
  if(!text) return;

  // Mode buttons send a hidden intent — show a friendly label instead of
  // the raw trigger phrase in the user bubble when it's a mode button tap.
  // For now just show whatever was sent; the trigger phrases are readable.
  appendMessage('user', text, new Date().toISOString(), false);

  if(overrideText === undefined){
    input.value = '';
    autosizeInput();
  }
  btn.disabled = true;
  appendTyping();

  try{
    var r = await fetch('/pwa/api/chat/send', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text}),
    });
    if(r.status === 401 || r.status === 403){window.location.href='/pwa/login';return}
    var d = await r.json();
    removeTyping();
    if(d.reply){
      appendMessage('assistant', d.reply, new Date().toISOString(), !d.success, d.action||null);
    }
  }catch(e){
    removeTyping();
    appendMessage('assistant', "Connection error. Try again in a moment.", new Date().toISOString(), true);
  }finally{
    btn.disabled = false;
    if(overrideText === undefined) input.focus();
  }
}

function autosizeInput(){
  var input = document.getElementById('input');
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

document.getElementById('composer').addEventListener('submit', function(e){
  e.preventDefault();
  sendMessage();
});
document.getElementById('input').addEventListener('input', autosizeInput);
document.getElementById('input').addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !e.shiftKey){e.preventDefault();sendMessage();}
});

// ---------------------------------------------------------------------------
// Voice input
// ---------------------------------------------------------------------------

(function setupVoice(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return;
  var micBtn = document.getElementById('mic-btn');
  var input  = document.getElementById('input');
  micBtn.classList.add('available');
  var rec = new SR();
  rec.lang = 'en-US';
  rec.interimResults = false;
  rec.continuous = false;
  rec.maxAlternatives = 1;
  var listening = false;
  function start(){
    if(listening) return;
    try{rec.start();listening=true;micBtn.classList.add('recording');}catch(e){}
  }
  function stop(){
    if(!listening) return;
    try{rec.stop();}catch(e){}
    listening=false;micBtn.classList.remove('recording');
  }
  micBtn.addEventListener('click', function(){if(listening){stop();}else{start();}});
  rec.onresult = function(ev){
    var t = '';
    for(var i=0;i<ev.results.length;i++) t += ev.results[i][0].transcript;
    t = t.trim();
    if(!t) return;
    var cur = input.value.trim();
    input.value = cur ? (cur+' '+t) : t;
    autosizeInput();
    input.focus();
  };
  rec.onerror = function(){stop();}
  rec.onend   = function(){listening=false;micBtn.classList.remove('recording');}
})();

// ---------------------------------------------------------------------------
// New Chat — restores mode picker
// ---------------------------------------------------------------------------

async function newChat(){
  var btn = document.getElementById('new-chat-btn');
  btn.disabled = true;
  try{
    var r = await fetch('/pwa/api/chat/new-session', {method:'POST'});
    if(r.status === 401 || r.status === 403){window.location.href='/pwa/login';return}
    var d = await r.json();
    if(!d.success) return;

    SESSION_ID = d.session_id;
    HAS_MESSAGES = false;

    // Clear messages and restore mode picker
    var m = document.getElementById('messages');
    m.innerHTML =
      '<div class="mode-picker" id="mode-picker">' +
        '<div class="mode-picker-label">What would you like to do?</div>' +
        '<div class="mode-grid">' +
          '<button type="button" class="mode-btn estimate" data-intent="new estimate">' +
            '<div class="mode-icon">📋</div>' +
            '<div class="mode-label">New Estimate</div>' +
            '<div class="mode-sub">Customer · Job · Price</div>' +
          '</button>' +
          '<button type="button" class="mode-btn job-tracker" data-intent="start job log">' +
            '<div class="mode-icon">📅</div>' +
            '<div class="mode-label">Job Tracker</div>' +
            '<div class="mode-sub">Crew · Equipment · Materials</div>' +
          '</button>' +
          '<button type="button" class="mode-btn work-order" data-intent="new work order">' +
            '<div class="mode-icon">🔧</div>' +
            '<div class="mode-label">Work Order</div>' +
            '<div class="mode-sub">Multi-day jobs</div>' +
          '</button>' +
          '<button type="button" class="mode-btn add-customer" data-intent="add a new customer">' +
            '<div class="mode-icon">👤</div>' +
            '<div class="mode-label">Add Customer</div>' +
            '<div class="mode-sub">Name · Phone · Address</div>' +
          '</button>' +
        '</div>' +
      '</div>';

    // Re-wire mode buttons
    m.querySelectorAll('.mode-btn[data-intent]').forEach(function(b){
      b.addEventListener('click', function(){
        hideModes();
        sendMessage(b.getAttribute('data-intent'));
      });
    });

    var input = document.getElementById('input');
    input.value = '';
    autosizeInput();
    input.focus();
  }catch(e){
    console.warn('new chat failed', e);
  }finally{
    btn.disabled = false;
  }
}

document.getElementById('new-chat-btn').addEventListener('click', newChat);

// ---------------------------------------------------------------------------
// Intent auto-fire from ?intent= URL param (e.g. Job Tracker tile on home)
// Fires after history loads so session_id is set first.
// ---------------------------------------------------------------------------

function checkIntentParam(){
  var params = new URLSearchParams(window.location.search);
  var intent = params.get('intent');
  if(!intent) return;

  // Map param values to intent phrases
  var intentMap = {
    'job_log':    'start job log',
    'estimate':   'new estimate',
    'work_order': 'new work order',
    'customer':   'add a new customer',
  };
  var phrase = intentMap[intent] || intent;

  // Clean URL immediately so refresh doesn't re-fire
  window.history.replaceState({}, '', window.location.pathname);

  setTimeout(function(){
    hideModes();
    sendMessage(phrase);
  }, 400);
}

loadHistory().then(checkIntentParam);
</script>
</body>
</html>
