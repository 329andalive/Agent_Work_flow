<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Your PIN — Bolts11</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,0.06);padding:32px 28px;width:100%;max-width:380px}
    .logo{font-size:28px;font-weight:800;color:#1a1a2e;text-align:center;letter-spacing:.03em}
    .sub{font-size:13px;color:#94a3b8;text-align:center;margin:4px 0 8px}
    .msg{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;border-radius:8px;padding:10px 14px;margin-bottom:20px;font-size:13px;text-align:center}
    .fg{margin-bottom:18px}
    .fg label{display:block;font-size:13px;font-weight:600;color:#334155;margin-bottom:5px}
    .fg input{width:100%;font-size:16px;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:8px;outline:none;font-family:inherit;background:#fff;color:#1e293b;transition:border-color .15s}
    .fg input:focus{border-color:#1a1a2e;box-shadow:0 0 0 3px rgba(26,26,46,0.08)}
    .fg input::placeholder{color:#94a3b8}
    .btn{display:block;width:100%;padding:14px;background:#1a1a2e;color:#fff;font-size:15px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin-top:8px;transition:opacity .15s}
    .btn:hover{opacity:.9}
    .flash{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">BOLTS11</div>
    <div class="sub">AI Back Office</div>
    <div class="msg">First time signing in? Set a 4-digit PIN for your account.</div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/set-pin">
      <input type="hidden" name="phone" value="{{ phone }}" />
      <div class="fg">
        <label>Choose a 4-Digit PIN</label>
        <input type="password" name="pin" maxlength="4" inputmode="numeric" pattern="[0-9]{4}" placeholder="••••" required />
      </div>
      <div class="fg">
        <label>Confirm PIN</label>
        <input type="password" name="pin_confirm" maxlength="4" inputmode="numeric" pattern="[0-9]{4}" placeholder="••••" required />
      </div>
      <button type="submit" class="btn">Set My PIN</button>
    </form>
  </div>
</body>
</html>
